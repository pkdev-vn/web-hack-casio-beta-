<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASIO HACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #8b0000;
            --bg-black: #0a0a0a;
            --card-bg: #141414;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
            --border: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            line-height: 1.6;
            padding-top: 80px;
        }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid var(--primary-red);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 1000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .logo {
            font-family: 'Fira Code', monospace;
            font-weight: 700; font-size: 1.5rem;
            color: var(--primary-red); text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* Hero Section */
        .hero {
            text-align: center; padding: 60px 20px;
            background: linear-gradient(to bottom, #2a0000, var(--bg-black));
        }

        .hero h1 { font-size: 3rem; margin-bottom: 10px; font-family: 'Fira Code'; }
        .hero span { color: var(--primary-red); }

        /* Main Container */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Đăng bài Section */
        .post-box {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 30px; border-radius: 10px; margin-bottom: 50px;
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.05);
        }

        .post-box h2 { color: var(--primary-red); margin-bottom: 20px; font-size: 1.2rem; text-transform: uppercase; }

        .input-group { margin-bottom: 15px; }
        input, textarea {
            width: 100%; padding: 12px; background: #000;
            border: 1px solid var(--border); color: #fff;
            border-radius: 5px; font-family: 'Inter';
        }
        input:focus, textarea:focus { border-color: var(--primary-red); outline: none; }

        .btn-post {
            background: var(--primary-red); color: #fff;
            border: none; padding: 12px 25px; border-radius: 5px;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; width: 100%;
        }
        .btn-post:hover { background: var(--dark-red); box-shadow: 0 0 15px var(--primary-red); }

        /* Feed Section */
        .feed-title {
            border-left: 4px solid var(--primary-red);
            padding-left: 15px; margin-bottom: 25px; font-family: 'Fira Code';
        }

        #postFeed { display: flex; flex-direction: column; gap: 20px; }

        .post-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 20px; border-radius: 8px; position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .post-user { color: var(--primary-red); font-weight: 700; font-family: 'Fira Code'; }
        .post-time { font-size: 0.8rem; color: var(--text-gray); }

        .post-body { color: #ddd; white-space: pre-wrap; }

        .delete-btn {
            background: none; border: none; color: #ff4d4d;
            cursor: pointer; font-size: 0.8rem; text-decoration: underline;
            margin-top: 10px; padding: 0;
        }

        footer { text-align: center; padding: 40px; color: var(--text-gray); font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">> CASIO.EXE</a>
        <div style="color: white; font-size: 0.9rem;">ADMIN CONSOLE</div>
    </nav>

    <div class="hero">
        <h1>SYSTEM <span>CORE</span> MOD</h1>
        <p>Giao diện đăng bài và quản lý Exploit cho cộng đồng Mod Casio</p>
    </div>

    <div class="container">
        
        <section class="post-box">
            <h2>[+] Tạo bài đăng mới</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Tên của bạn (VD: nam)...">
            </div>
            <div class="input-group">
                <textarea id="postContent" rows="4" placeholder="Nhập mã ROP, Hex Payload hoặc nội dung hướng dẫn v.v"></textarea>
            </div>
            <button class="btn-post" onclick="publishPost()">Đăng lên hệ thống</button>
        </section>

        <h2 class="feed-title">Dòng thời gian Exploit</h2>
        <div id="postFeed">
            </div>

    </div>

    <footer>
        &copy; CASIO HACK
    </footer>

    <script>
        // Hàm load bài đăng từ LocalStorage khi mở trang
        window.onload = function() {
            displayPosts();
        };

        function publishPost() {
            const user = document.getElementById('username').value;
            const content = document.getElementById('postContent').value;

            if (user.trim() === "" || content.trim() === "") {
                alert("Vui lòng nhập tên và nội dung!");
                return;
            }

            const newPost = {
                id: Date.now(),
                author: user,
                body: content,
                time: new Date().toLocaleString('vi-VN')
            };

            // Lấy danh sách cũ, thêm bài mới, lưu lại
            let posts = JSON.parse(localStorage.getItem('casioPosts')) || [];
            posts.unshift(newPost); // Đưa bài mới lên đầu
            localStorage.setItem('casioPosts', JSON.stringify(posts));

            // Xóa form và cập nhật hiển thị
            document.getElementById('username').value = "";
            document.getElementById('postContent').value = "";
            displayPosts();
        }

        function displayPosts() {
            const feed = document.getElementById('postFeed');
            const posts = JSON.parse(localStorage.getItem('casioPosts')) || [];
            
            feed.innerHTML = ""; // Xóa feed cũ để vẽ lại

            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <span class="post-user">${post.author}</span>
                        <span class="post-time">${post.time}</span>
                    </div>
                    <div class="post-body">${post.body}</div>
                    <button class="delete-btn" onclick="deletePost(${post.id})">Xóa bài này</button>
                `;
                feed.appendChild(card);
            });
        }

        function deletePost(postId) {
            if(confirm("Bạn có chắc muốn xóa bài này không?")) {
                let posts = JSON.parse(localStorage.getItem('casioPosts')) || [];
                posts = posts.filter(p => p.id !== postId);
                localStorage.setItem('casioPosts', JSON.stringify(posts));
                displayPosts();
            }
        }
    </script>
</body>
</html>
