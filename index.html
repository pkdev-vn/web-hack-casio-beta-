<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hack casio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-color:#f4f4f9;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* thanh trên */
.navbar{
    background-color:#ff2400;
    color:white;
    padding:15px 30px;
    display:flex;
    align-items:center;
    box-shadow:0 0 20px 5px rgba(255,0,0,0.7);
}

.nav-brand{
    font-size:24px;
    font-weight:bold;
    margin-right:40px;
    text-transform:uppercase;
}

.nav-menu{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-menu li a{
    color:white;
    text-decoration:none;
    font-size:16px;
}

.nav-menu li a:hover{
    text-shadow:0 0 10px white;
}

/* nội dung */
.main-content{
    flex:1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:60px;
}

/* ảnh bên trái */
.left img{
    width:350px;
}

/* chữ bên phải */
.right{
    font-size:45px;
    color:#333;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="nav-brand">Hack casio</div>

<ul class="nav-menu">
<li><a href="#">1</a></li>
<li><a href="#">2</a></li>
<li><a href="#">3</a></li>
<li><a href="#">4</a></li>
</ul>
</nav>

<main class="main-content">

<div class="left">
<img src="https://via.placeholder.com/350" alt="ảnh">
</div>

<div class="right">
<h1>Nhìn cái j nữa</h1>
</div>

</main>

</body>
</html>
