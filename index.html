<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Nền tảng chia sẻ tri thức</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a;
    --surface: #0f1012;
    --surface2: #16181c;
    --border: #1e2128;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --text: #e8eaf0;
    --muted: #6b7080;
    --danger: #f04a6a;
    --card-hover: #13151a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(200,240,74,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,74,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,9,10,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 24px; font-weight: 900;
    color: var(--accent);
    letter-spacing: -1px;
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .logo span { color: var(--text); }
  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .nav-right { display: flex; align-items: center; gap: 24px; }
  .badge {
    font-size: 11px; padding: 4px 10px;
    border-radius: 4px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .badge-viewer {
    background: rgba(74,240,200,0.1);
    color: var(--accent2);
    border: 1px solid rgba(74,240,200,0.2);
  }
  .btn-admin {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px; border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px; cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-admin:hover { border-color: var(--accent); color: var(--accent); }

  /* HERO */
  .hero {
    position: relative; z-index: 1;
    padding: 80px 40px 60px;
    max-width: 1200px; margin: 0 auto;
  }
  .hero-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 20px;
  }
  .hero-label::before {
    content: ''; display: block;
    width: 24px; height: 1px; background: var(--accent);
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 900; line-height: 0.95;
    letter-spacing: -3px;
    margin-bottom: 24px;
  }
  .hero h1 em {
    font-style: italic; color: var(--accent);
    font-weight: 300;
  }
  .hero-sub {
    font-size: 14px; color: var(--muted);
    max-width: 480px; line-height: 1.8;
  }

  /* STATS BAR */
  .stats-bar {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto 60px;
    padding: 0 40px;
    display: flex; gap: 0;
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .stat-item {
    flex: 1; padding: 20px 28px;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 36px; font-weight: 900;
    color: var(--accent); line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* FILTER BAR */
  .filter-bar {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto 40px;
    padding: 0 40px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 18px; border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,240,74,0.05);
  }
  .search-box {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    display: flex; align-items: center;
  }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 13px; padding: 8px 16px; width: 220px;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box button {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 8px 14px; font-size: 16px;
    transition: color 0.2s;
  }
  .search-box button:hover { color: var(--accent); }

  /* POSTS GRID */
  .posts-section {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 0 40px 80px;
  }
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 2px;
  }

  /* POST CARD */
  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0; margin: -1px 0 0 -1px;
    padding: 32px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .post-card:hover {
    background: var(--card-hover);
    border-color: rgba(200,240,74,0.3);
    z-index: 2;
    transform: translate(-2px,-2px);
    box-shadow: 4px 4px 0 var(--accent);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .card-cat {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px; font-weight: 700;
  }
  .cat-tech { background: rgba(200,240,74,0.1); color: var(--accent); border: 1px solid rgba(200,240,74,0.2); }
  .cat-science { background: rgba(74,240,200,0.1); color: var(--accent2); border: 1px solid rgba(74,240,200,0.2); }
  .cat-general { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
  .cat-code { background: rgba(240,74,106,0.1); color: var(--danger); border: 1px solid rgba(240,74,106,0.2); }

  .card-date { font-size: 11px; color: var(--muted); margin-left: auto; }
  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    line-height: 1.3; margin-bottom: 12px;
    color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-excerpt {
    font-size: 13px; color: var(--muted); line-height: 1.7;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 20px;
  }
  .card-footer {
    display: flex; align-items: center; gap: 16px;
    font-size: 11px; color: var(--muted);
  }
  .card-footer span { display: flex; align-items: center; gap: 5px; }
  .has-code-badge {
    margin-left: auto;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 3px;
    background: rgba(240,74,106,0.1); color: var(--danger);
    border: 1px solid rgba(240,74,106,0.2);
  }
  .card-arrow {
    position: absolute; bottom: 32px; right: 32px;
    font-size: 18px; color: var(--border);
    transition: all 0.2s;
  }
  .post-card:hover .card-arrow { color: var(--accent); transform: translate(3px,-3px); }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1;
    text-align: center; padding: 80px 20px;
  }
  .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
  .empty-state h3 { font-family: 'Fraunces', serif; font-size: 28px; margin-bottom: 10px; color: var(--muted); }
  .empty-state p { font-size: 13px; color: var(--muted); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%; max-width: 760px;
    transform: translateY(30px);
    transition: transform 0.3s;
    overflow: hidden;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 32px 40px 0;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 20px;
  }
  .modal-header-left { flex: 1; }
  .modal-category { margin-bottom: 12px; }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 36px; font-weight: 900;
    line-height: 1.15; letter-spacing: -1px;
    margin-bottom: 16px;
  }
  .modal-info { font-size: 12px; color: var(--muted); display: flex; gap: 20px; flex-wrap: wrap; }
  .modal-close {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); width: 36px; height: 36px;
    border-radius: 8px; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }
  .modal-divider { height: 1px; background: var(--border); margin: 24px 40px; }
  .modal-body { padding: 0 40px 40px; }
  .modal-content {
    font-size: 15px; line-height: 1.9; color: rgba(232,234,240,0.85);
    white-space: pre-wrap;
  }
  .modal-code-section { margin-top: 28px; }
  .code-label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--danger); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .code-label::before { content: ''; display: block; width: 16px; height: 1px; background: var(--danger); }
  .code-block {
    background: #0a0c0e;
    border: 1px solid rgba(240,74,106,0.2);
    border-radius: 10px; padding: 20px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; color: #f9d4dc;
    overflow-x: auto; white-space: pre; line-height: 1.7;
  }
  .output-block {
    background: #050607;
    border: 1px solid rgba(200,240,74,0.15);
    border-radius: 10px; padding: 16px 24px; margin-top: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; color: var(--accent);
    white-space: pre; overflow-x: auto; line-height: 1.7;
  }
  .output-label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .output-label::before { content: ''; display: block; width: 16px; height: 1px; background: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 30px; right: 30px; z-index: 9999;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 20px;
    font-size: 13px; color: var(--text);
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s; pointer-events: none;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(200,240,74,0.4); }
  .toast.error { border-color: rgba(240,74,106,0.4); }

  /* LOADING */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 80px; grid-column: 1/-1;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    .hero, .stats-bar, .filter-bar, .posts-section { padding-left: 20px; padding-right: 20px; }
    .hero h1 { font-size: 48px; }
    .stats-bar { flex-direction: column; border-radius: 8px; }
    .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
    .stat-item:last-child { border-bottom: none; }
    .search-box { width: 100%; }
    .posts-grid { grid-template-columns: 1fr; gap: 12px; }
    .post-card { margin: 0; }
    .modal { border-radius: 12px; }
    .modal-header, .modal-body { padding-left: 24px; padding-right: 24px; }
    .modal-divider { margin-left: 24px; margin-right: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-dot"></div>
      NEXUS<span>.IO</span>
    </a>
    <div class="nav-right">
      <span class="badge badge-viewer">👁 Viewer</span>
      <a href="/admin" class="btn-admin">⚡ Admin</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-label">Nền tảng tri thức số</div>
  <h1>Khám phá<br><em>ý tưởng</em><br>mới nhất</h1>
  <p class="hero-sub">Không gian chia sẻ bài viết, code Python và kiến thức từ đội ngũ admin chuyên nghiệp.</p>
</section>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-num" id="totalPosts">0</div>
    <div class="stat-label">Bài viết</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="totalViews">0</div>
    <div class="stat-label">Lượt xem</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="totalCode">0</div>
    <div class="stat-label">Code Python</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="totalCats">0</div>
    <div class="stat-label">Chủ đề</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterPosts('all', this)">Tất cả</button>
  <button class="filter-btn" onclick="filterPosts('tech', this)">⚡ Công nghệ</button>
  <button class="filter-btn" onclick="filterPosts('science', this)">🔬 Khoa học</button>
  <button class="filter-btn" onclick="filterPosts('code', this)">💻 Code</button>
  <button class="filter-btn" onclick="filterPosts('general', this)">📝 Tổng hợp</button>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm bài viết..." oninput="searchPosts()">
    <button>🔍</button>
  </div>
</div>

<main class="posts-section">
  <div class="posts-grid" id="postsGrid">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-category" id="modalCat"></div>
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-info" id="modalInfo"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-body">
      <div class="modal-content" id="modalContent"></div>
      <div id="modalCode"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5000/api';
let allPosts = [];
let currentFilter = 'all';
let currentSearch = '';

function catClass(cat) {
  const map = { tech: 'cat-tech', science: 'cat-science', code: 'cat-code', general: 'cat-general' };
  return map[cat] || 'cat-general';
}
function catLabel(cat) {
  const map = { tech: '⚡ Công nghệ', science: '🔬 Khoa học', code: '💻 Code', general: '📝 Tổng hợp' };
  return map[cat] || '📝 Tổng hợp';
}
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
}

async function loadPosts() {
  try {
    const res = await fetch(`${API}/posts`);
    allPosts = await res.json();
    renderStats();
    renderPosts();
  } catch(e) {
    document.getElementById('postsGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Không thể kết nối</h3>
        <p>Hãy chạy <code>python app.py</code> để khởi động server</p>
      </div>`;
  }
}

function renderStats() {
  const totalViews = allPosts.reduce((a,p) => a + (p.views||0), 0);
  const totalCode = allPosts.filter(p => p.code).length;
  const cats = new Set(allPosts.map(p => p.category)).size;
  animateNumber('totalPosts', allPosts.length);
  animateNumber('totalViews', totalViews);
  animateNumber('totalCode', totalCode);
  animateNumber('totalCats', cats);
}

function animateNumber(id, target) {
  const el = document.getElementById(id);
  let cur = 0; const step = Math.ceil(target / 30);
  const t = setInterval(() => {
    cur = Math.min(cur + step, target);
    el.textContent = cur;
    if (cur >= target) clearInterval(t);
  }, 30);
}

function getFilteredPosts() {
  let posts = allPosts;
  if (currentFilter !== 'all') posts = posts.filter(p => p.category === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    posts = posts.filter(p => p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q));
  }
  return posts;
}

function renderPosts() {
  const posts = getFilteredPosts();
  const grid = document.getElementById('postsGrid');
  if (!posts.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>Chưa có bài viết</h3><p>Chưa có bài viết nào phù hợp.</p></div>`;
    return;
  }
  grid.innerHTML = posts.map((p, i) => `
    <div class="post-card" style="animation-delay:${i*0.06}s" onclick="openPost(${p.id})">
      <div class="card-meta">
        <span class="card-cat ${catClass(p.category)}">${catLabel(p.category)}</span>
        <span class="card-date">${formatDate(p.created_at)}</span>
      </div>
      <h3 class="card-title">${escHtml(p.title)}</h3>
      <p class="card-excerpt">${escHtml(p.content)}</p>
      <div class="card-footer">
        <span>👁 ${p.views||0}</span>
        ${p.code ? `<span class="has-code-badge">🐍 Python</span>` : ''}
      </div>
      <span class="card-arrow">↗</span>
    </div>`).join('');
}

function filterPosts(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPosts();
}

function searchPosts() {
  currentSearch = document.getElementById('searchInput').value;
  renderPosts();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function openPost(id) {
  const post = allPosts.find(p => p.id === id);
  if (!post) return;
  fetch(`${API}/posts/${id}/view`, { method: 'POST' });
  post.views = (post.views||0) + 1;
  document.getElementById('modalCat').innerHTML = `<span class="card-cat ${catClass(post.category)}">${catLabel(post.category)}</span>`;
  document.getElementById('modalTitle').textContent = post.title;
  document.getElementById('modalInfo').innerHTML = `
    <span>📅 ${formatDate(post.created_at)}</span>
    <span>👁 ${post.views} lượt xem</span>
    ${post.code ? '<span>🐍 Có code Python</span>' : ''}`;
  document.getElementById('modalContent').textContent = post.content;
  document.getElementById('modalCode').innerHTML = post.code ? `
    <div class="modal-code-section">
      <div class="code-label">Source Code Python</div>
      <div class="code-block">${escHtml(post.code)}</div>
      ${post.code_output ? `
        <div class="output-label" style="margin-top:16px">Output</div>
        <div class="output-block">${escHtml(post.code_output)}</div>` : ''}
    </div>` : '';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderStats();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

loadPosts();
setInterval(loadPosts, 30000);
</script>
</body>
</html>
