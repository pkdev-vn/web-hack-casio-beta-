<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra CMS - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #0b0f1a; color: #e2e8f0; overflow-x: hidden; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tag-active { background: #38bdf8 !important; color: white !important; box-shadow: 0 0 15px rgba(56,189,248,0.4); }
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, textarea, select { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>
  <script>
    // Chống chuột phải
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Chống các phím tắt F12, Ctrl+Shift+I, Ctrl+U
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
            (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
            return false;
        }
    };
</script>

    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-bolt text-white"></i></div>
                <h1 class="text-2xl font-extrabold gradient-text uppercase">Dev<span class="text-white">Admin</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative hidden sm:block">
                    <i class="fas fa-search absolute left-4 top-3 text-slate-500 text-xs"></i>
                    <input type="text" id="search-bar" oninput="renderPosts()" placeholder="Tìm nội dung..." class="pl-10 pr-4 py-2 rounded-full text-xs w-48 glass outline-none">
                </div>
                <div id="auth-zone"></div>
            </div>
        </div>
    </nav>

    <div class="bg-[#0f172a]/50 border-b border-white/5 py-3 overflow-x-auto no-scrollbar">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between gap-4">
            <div id="tag-list" class="flex items-center gap-2">
                <button onclick="filterByCategory('Tất cả')" class="tag-item tag-active px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap bg-white/5 text-slate-400 hover:bg-white/10">Tất cả</button>
                <button onclick="filterByCategory('Công nghệ')" class="tag-item px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap bg-white/5 text-slate-400 hover:bg-white/10 border border-transparent">Công nghệ</button>
                <button onclick="filterByCategory('Lập trình')" class="tag-item px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap bg-white/5 text-slate-400 hover:bg-white/10 border border-transparent">Lập trình</button>
                <button onclick="filterByCategory('Thủ thuật')" class="tag-item px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap bg-white/5 text-slate-400 hover:bg-white/10 border border-transparent">Thủ thuật</button>
                <button onclick="filterByCategory('Đời sống')" class="tag-item px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap bg-white/5 text-slate-400 hover:bg-white/10 border border-transparent">Đời sống</button>
            </div>
            <div class="flex items-center gap-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest border-l border-white/10 pl-4 hidden md:flex">
                <span>Trạng thái: <span class="text-green-500">Trực tuyến</span></span>
                <span id="post-count">0 Bài viết</span>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <section id="page-home" class="page-transition">
            <div id="admin-header" class="hidden flex justify-between items-center mb-8 bg-sky-500/5 p-6 rounded-2xl border border-sky-500/20">
                <div>
                    <h2 class="text-lg font-bold text-sky-400">Bảng điều khiển Admin</h2>
                    <p class="text-xs text-slate-400">Bạn có quyền thêm, sửa và xóa tất cả các bài đăng.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="p-3 glass rounded-xl hover:text-sky-400" title="Sao lưu"><i class="fas fa-cloud-download-alt"></i></button>
                    <button onclick="showPage('editor')" class="bg-sky-500 px-6 py-3 rounded-xl font-bold text-sm shadow-lg shadow-sky-500/20 flex items-center gap-2">
                        <i class="fas fa-plus-circle"></i> Soạn bài mới
                    </button>
                </div>
            </div>
            <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="page-login" class="hidden page-transition flex justify-center py-20">
            <div class="glass p-10 rounded-[2.5rem] w-full max-w-md border border-white/10 shadow-2xl">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-sky-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-sky-500/20">
                        <i class="fas fa-shield-alt text-2xl text-sky-500"></i>
                    </div>
                    <h3 class="text-2xl font-bold">Đăng nhập Admin</h3>
                </div>
                <div class="space-y-4">
                    <input type="text" id="user" placeholder="Tên tài khoản" class="w-full p-4 rounded-xl outline-none">
                    <input type="password" id="pass" placeholder="Mật khẩu" class="w-full p-4 rounded-xl outline-none">
                    <button onclick="handleLogin()" class="w-full bg-sky-500 py-4 rounded-xl font-bold hover:scale-[1.02] transition-all">Xác thực</button>
                </div>
            </div>
        </section>

        <section id="page-editor" class="hidden page-transition max-w-3xl mx-auto">
            <h3 id="editor-title" class="text-3xl font-bold mb-8">Viết nội dung mới</h3>
            <div class="glass p-8 rounded-3xl space-y-6">
                <input type="hidden" id="edit-id">
                <input type="text" id="post-title" placeholder="Tiêu đề bài viết..." class="w-full p-4 rounded-xl text-xl font-bold outline-none border border-white/10">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="post-image" placeholder="URL ảnh bìa..." class="w-full p-4 rounded-xl text-sm outline-none border border-white/10">
                    <select id="post-category" class="w-full p-4 rounded-xl text-sm outline-none border border-white/10">
                        <option value="Công nghệ">Công nghệ</option>
                        <option value="Lập trình">Lập trình</option>
                        <option value="Thủ thuật">Thủ thuật</option>
                        <option value="Đời sống">Đời sống</option>
                    </select>
                </div>
                <textarea id="post-content" rows="10" placeholder="Nội dung chi tiết..." class="w-full p-4 rounded-xl outline-none border border-white/10 leading-relaxed"></textarea>
                <div class="flex gap-4">
                    <button onclick="showPage('home')" class="w-1/3 bg-white/5 py-4 rounded-xl font-bold">Hủy</button>
                    <button onclick="savePost()" class="w-2/3 bg-sky-500 py-4 rounded-xl font-bold shadow-lg shadow-sky-500/20">Lưu & Xuất bản</button>
                </div>
            </div>
        </section>

        <section id="page-view" class="hidden page-transition max-w-4xl mx-auto">
            <div id="post-full-content"></div>
        </section>
    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('pro_cms_posts')) || [];
        let isLogged = sessionStorage.getItem('isLogged') === 'true';
        let currentFilter = 'Tất cả';

        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            window.scrollTo(0,0);
            if(pageId === 'home') renderPosts();
        }

        function handleLogin() {
            if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '123456') {
                isLogged = true;
                sessionStorage.setItem('isLogged', 'true');
                updateAuthUI();
                showPage('home');
            } else alert('Sai thông tin!');
        }

        function handleLogout() {
            isLogged = false;
            sessionStorage.removeItem('isLogged');
            updateAuthUI();
            showPage('home');
        }

        function updateAuthUI() {
            const zone = document.getElementById('auth-zone');
            document.getElementById('admin-header').classList.toggle('hidden', !isLogged);
            if(isLogged) {
                zone.innerHTML = `<button onclick="handleLogout()" class="text-red-400 font-bold text-xs bg-red-400/10 px-4 py-2 rounded-lg">THOÁT</button>`;
            } else {
                zone.innerHTML = `<button onclick="showPage('login')" class="bg-white/5 px-5 py-2 rounded-lg font-bold text-xs border border-white/10">ADMIN LOGIN</button>`;
            }
        }

        function filterByCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.tag-item').forEach(btn => {
                btn.classList.toggle('tag-active', btn.innerText === cat);
            });
            renderPosts();
        }

        function savePost() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const category = document.getElementById('post-category').value;
            const img = document.getElementById('post-image').value || 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1000';

            if(!title || !content) return alert('Thiếu dữ liệu!');

            if(id) {
                const idx = posts.findIndex(p => p.id == id);
                posts[idx] = { ...posts[idx], title, body: content, image: img, category };
            } else {
                posts.unshift({ id: Date.now(), title, body: content, image: img, category, date: new Date().toLocaleDateString('vi-VN') });
            }

            localStorage.setItem('pro_cms_posts', JSON.stringify(posts));
            clearEditor();
            showPage('home');
        }

        function clearEditor() {
            document.getElementById('edit-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('post-image').value = '';
            document.getElementById('editor-title').innerText = "Viết nội dung mới";
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            const search = document.getElementById('search-bar').value.toLowerCase();
            
            const filtered = posts.filter(p => {
                const matchesSearch = p.title.toLowerCase().includes(search);
                const matchesCat = currentFilter === 'Tất cả' || p.category === currentFilter;
                return matchesSearch && matchesCat;
            });

            document.getElementById('post-count').innerText = `${filtered.length} Bài viết`;

            if(filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500">Trống rỗng...</div>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="glass rounded-2xl overflow-hidden border border-white/5 hover:border-sky-500/50 transition-all cursor-pointer group shadow-xl" onclick="viewPost(${p.id})">
                    <div class="h-48 overflow-hidden relative">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute bottom-3 left-3 bg-black/60 backdrop-blur-md px-3 py-1 rounded-lg text-[10px] font-bold text-sky-400 uppercase">${p.category}</div>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] text-slate-500 font-bold">${p.date}</span>
                            ${isLogged ? `
                                <div class="flex gap-2">
                                    <button onclick="editPost(${p.id}, event)" class="hover:text-sky-400 p-1"><i class="fas fa-pencil-alt text-xs"></i></button>
                                    <button onclick="deletePost(${p.id}, event)" class="hover:text-red-500 p-1"><i class="fas fa-trash text-xs"></i></button>
                                </div>
                            ` : ''}
                        </div>
                        <h4 class="font-bold text-lg mb-2 line-clamp-2 group-hover:text-sky-400 transition-colors">${p.title}</h4>
                        <p class="text-slate-400 text-xs line-clamp-2 leading-relaxed">${p.body}</p>
                    </div>
                </div>
            `).join('');
        }

        function viewPost(id) {
            const p = posts.find(post => post.id === id);
            document.getElementById('post-full-content').innerHTML = `
                <button onclick="showPage('home')" class="mb-6 text-slate-500 hover:text-white text-sm flex items-center gap-2 transition-all"><i class="fas fa-long-arrow-alt-left"></i> Quay lại</button>
                <div class="rounded-3xl overflow-hidden shadow-2xl mb-8 border border-white/10">
                    <img src="${p.image}" class="w-full h-[350px] object-cover">
                </div>
                <div class="px-2">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="bg-sky-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">${p.category}</span>
                        <span class="text-slate-500 text-xs">${p.date}</span>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black mb-10 leading-tight">${p.title}</h1>
                    <div class="text-slate-300 text-lg leading-loose whitespace-pre-line">${p.body}</div>
                </div>
            `;
            showPage('view');
        }

        function deletePost(id, e) {
            e.stopPropagation();
            if(confirm('Xóa bài này?')) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('pro_cms_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function editPost(id, e) {
            e.stopPropagation();
            const post = posts.find(p => p.id === id);
            document.getElementById('edit-id').value = post.id;
            document.getElementById('post-title').value = post.title;
            document.getElementById('post-content').value = post.body;
            document.getElementById('post-image').value = post.image;
            document.getElementById('post-category').value = post.category;
            document.getElementById('editor-title').innerText = "Chỉnh sửa bài viết";
            showPage('editor');
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(posts));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "cms_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        updateAuthUI();
        renderPosts();
    </script>
</body>
</html>
